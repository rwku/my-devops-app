version: "3.9"

services:

  app:

    build: .

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - db

    networks:
      - devops-network

  db:

    image: postgres:15-alpine

    container_name: postgres-db-b

    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password123

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - devops-network

volumes:

  postgres_data:

networks:

  devops-network:
